<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Sell Your Product - AgroMarket</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
}


.ccc{
    color: white;
    height: 35px;
    width: 88px;
    border: 2px solid white;
}

p{
    text-align: center;
}
/* HEADER */
.header {
    padding: none;
    margin: none;
    background: green;
    color: white;
    height: 54px;
    font-size: 20px;
     display: grid;
    grid-template-columns: auto auto;
}

/* FORM CONTAINER */
.container {
    max-width: 500px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: green;
    color: white;
    border: none;
    margin-top: 15px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

.ccc:hover{
    background-color: white;
    color: green;
    border: 2px solid black;
}

/* IMAGE PREVIEW */
.preview {
    width: 100%;
    height: 200px;
    margin-top: 10px;
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview img {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>

    
      
<div class="header">
      <button class="ccc" onclick="closeProduct()"> << Back </button>
   <p> Sell Your Product</p></div>

<div class="container">
    
    <form id="productForm">
        
        <label>Upload Product Image</label>
        <input type="file" id="imageInput" accept="image/*">

        <div class="preview" id="imagePreview">
            <span>No image selected</span>
        </div>

        <label>Product Name</label>
        <input type="text" id="name" required>

        <label>Category</label>
        <select id="category">
            <option>Grains</option>
            <option>Fruits</option>
            <option>Vegetables</option>
            <option>Livestock</option>
        </select>

        <label>Price (₦)</label>
        <input type="number" id="price" required>

        <label>Stock Quantity</label>
        <input type="number" id="stock" required>

        <label>Description</label>
        <textarea id="description"></textarea>

        <label>Seller Name</label>
        <input type="text" id="seller">

        <button type="submit">Upload Product</button>

    </form>

</div>

<script>
// IMAGE PREVIEW
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('imagePreview');

imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = () => {
            preview.innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(file);
    }
});

// FORM SUBMIT
document.getElementById('productForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const product = {
        name: document.getElementById('name').value,
        category: document.getElementById('category').value,
        price: document.getElementById('price').value,
        stock: document.getElementById('stock').value,
        description: document.getElementById('description').value,
        seller: document.getElementById('seller').value,
        image: preview.querySelector('img')?.src || ""
    };

    // Save to localStorage (temporary database)
    let products = JSON.parse(localStorage.getItem('products')) || [];
    products.push(product);
    localStorage.setItem('products', JSON.stringify(products));

    alert("Product uploaded successfully!");

    this.reset();
    preview.innerHTML = "<span>No image selected</span>";
});

 function closeProduct(){
    document.getElementById("productPage").classList.remove("active");
}
</script>

</body>
</html>
