<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Chat + AI 🤖</title>
  <link rel="stylesheet" href="style.css">
  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; 
        padding: 0; 
        box-sizing: 
        border-box; 
        font-family: Arial, sans-serif; 
    }

body {
  background: #d4dbd7;
  height: 100vh;
}

.chat-container {
  width: 100%;
  height: 100vh;
  background: #b9bfc9;
  /* border-radius: 20px; */
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.chat-header {
  background: #16bb07;
  padding: 15px;
  color: white;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
  position: relative;
}

.toggle {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 12px;
  color: white;
  cursor: pointer;
}

.chat-messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Message row with avatar */
.message-row {
  display: flex;
  justify-content: flex-start;
  align-items: flex-end;
  gap: 8px;
}

.message-row.outgoing {
  justify-content: flex-start;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
}

.message {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 15px;
  font-size: 14px;
  line-height: 1.4;
}

.incoming .message {
  background: #334155;
  color: #fff;
  border-bottom-left-radius: 5px;
}

.outgoing .message {
  background: #22c55e;
  color: white;
  border-bottom-right-radius: 5px;
}

.typing {
  display: flex;
  gap: 5px;
  background: #334155;
  padding: 10px 14px;
  border-radius: 15px;
  border-bottom-left-radius: 5px;
  width: fit-content;
  margin-left: 40px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #cbd5f5;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

.chat-input {
  display: flex;
  padding: 10px;
  background: #47c228;
  border-top: 1px solid #1e293b;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #f1f3f7;
  color: black;
}

.chat-input button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 50%;
  background: #e0e4e0;
  color: black;
  cursor: pointer;
  font-size: 16px;
}

  </style>
</head>
<body><div class="chat-container">
  <div class="chat-header">
    🌍 World Chat
    <span class="toggle" onclick="toggleMode()" id="modeLabel">AI: ON</span>
  </div>  <div class="chat-messages" id="chatMessages"></div>  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Ask anything...">
    <button onclick="sendMessage()">➤</button>
  </div>
</div><script>
  const input = document.getElementById("messageInput");
  const chatMessages = document.getElementById("chatMessages");
  const modeLabel = document.getElementById("modeLabel");

  let aiMode = true;

  const userAvatar = "https://i.pravatar.cc/150?img=3";
  const botAvatar = "https://i.pravatar.cc/150?img=12";

  function toggleMode() {
    aiMode = !aiMode;
    modeLabel.innerText = aiMode ? "AI: ON" : "AI: OFF";
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "outgoing");
    input.value = "";

    showTyping();

    setTimeout(() => {
      hideTyping();
      let reply = aiMode ? getAIResponse(text) : getRandomReply();
      addMessage(reply, "incoming");
    }, 1200);
  }

  function addMessage(text, type) {
    const row = document.createElement("div");
    row.classList.add("message-row", type);

    const avatar = document.createElement("img");
    avatar.classList.add("avatar");
    avatar.src = type === "outgoing" ? userAvatar : botAvatar;

    const msg = document.createElement("div");
    msg.classList.add("message");
    msg.innerText = text;

    // All messages aligned to left
    row.appendChild(avatar);
    row.appendChild(msg);

    chatMessages.appendChild(row);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const typing = document.createElement("div");
    typing.classList.add("typing");
    typing.id = "typing";
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatMessages.appendChild(typing);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function hideTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
  }

  function getAIResponse(input) {
    input = input.toLowerCase();
    if (input.includes("hello") || input.includes("hi")) return "Hello 👋 How can I help you today?";
    if (input.includes("name")) return "I'm your AI chat assistant 🤖";
    if (input.includes("how are you")) return "I'm running perfectly 😄";
    if (input.includes("help")) return "Ask me anything 🌍";
    return "That's interesting 🤔 Tell me more!";
  }

  function getRandomReply() {
    const replies = [
      "Hello from Canada 🇨🇦",
      "Hi from Japan 🇯🇵",
      "Greetings from Brazil 🇧🇷",
      "Hey from Germany 🇩🇪"
    ];
    return replies[Math.floor(Math.random() * replies.length)];
  }

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>
